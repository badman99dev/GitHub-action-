name: Quick Live Test

on:
  workflow_dispatch:

jobs:
  run-and-expose:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          repository: badman99dev/OpencodeAi
          ref: feature/personal-settings

      - name: 🛠️ Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install Root Dependencies
        run: |
          bun install

      - name: 📦 Install OpenCode Dependencies
        run: |
          cd packages/opencode
          bun install

      - name: 📦 Install App Dependencies & Build
        run: |
          cd packages/app
          bun install
          bun run build

      - name: 🚇 Install Bore
        run: |
          wget -qO bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz
          sudo mv bore /usr/local/bin/
          rm bore.tar.gz

      - name: 🚀 Start Server
        run: |
          cd packages/opencode
          bun src/index.ts serve --port 7860 --hostname 0.0.0.0 &
          sleep 10

      - name: 🌐 Start Bore Tunnel
        run: |
          bore local 7860 --to bore.pub
