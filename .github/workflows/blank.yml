name: Quick Live Test via Bore

on:
  workflow_dispatch: # इससे आप GitHub UI से इसे manually रन कर पाएंगे

jobs:
  run-and-expose:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: badman99dev/OpencodeAi
          ref: dev # अपनी ब्रांच के हिसाब से इसे बदल सकते हैं

      - name: 🛠️ Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: |
          bun install
          cd packages/opencode
          bun install

      - name: 🚇 Install Bore (Tunneling Tool)
        run: |
          # Bore का प्री-कंपाइल्ड बाइनरी डाउनलोड और इंस्टॉल करना
          wget -qO bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz
          sudo mv bore /usr/local/bin/
          rm bore.tar.gz

      - name: 🚀 Start Server & Bore Tunnel
        env:
          OPENCODE_SERVER_AUTH: false
          # अगर कोई और API Key या Env Var चाहिए, तो यहाँ ऐड करें
        run: |
          # Git कॉन्फ़िगरेशन सेट करें ताकि कोई इंटरनल एरर न आए
          git config --global user.email "badal@example.com"
          git config --global user.name "Badal"
          
          # OpenCode सर्वर को बैकग्राउंड (&) में रन करें
          cd packages/opencode
          bun src/index.ts web --port 7860 --hostname 0.0.0.0 &
          
          # सर्वर के स्टार्ट होने का 15 सेकंड इंतज़ार करें
          echo "Waiting for server to start..."
          sleep 15
          
          # Bore टनल स्टार्ट करें (यह foreground में चलेगा ताकि Action बंद न हो)
          echo "Starting Bore tunnel..."
          bore local 7860 --to bore.pub
