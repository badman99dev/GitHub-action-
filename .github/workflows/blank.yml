name: Quick Live Test

on:
  workflow_dispatch:

jobs:
  run-and-expose:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: badman99dev/OpencodeAi
          ref: feature/personal-settings

      - name: 🛠️ Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: |
          bun install
          cd packages/opencode
          bun install

      - name: 🏗️ Build App
        run: |
          cd packages/app
          bun run build

      - name: 🚀 Start Server
        env:
          OPENCODE_SERVER_AUTH: false
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test"
          
          cd packages/opencode
          bun src/index.ts web --port 7860 --hostname 0.0.0.0 &
          
          sleep 15

      - name: 🚇 Start Bore Tunnel
        run: |
          wget -qO bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz
          sudo mv bore /usr/local/bin/
          bore local 7860 --to bore.pub
