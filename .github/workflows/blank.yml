name: Quick Live Test via Bore

on:
  workflow_dispatch:

jobs:
  run-and-expose:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout OpencodeAi Repository
        uses: actions/checkout@v4
        with:
          repository: badman99dev/OpencodeAi
          ref: feature/personal-settings # यहाँ हमने आपकी स्पेसिफिक ब्रांच सेट कर दी है

      - name: 🛠️ Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: |
          bun install
          cd packages/opencode
          bun install

      - name: 🚇 Install Bore (Tunneling Tool)
        run: |
          wget -qO bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz
          sudo mv bore /usr/local/bin/
          rm bore.tar.gz

      - name: 🚀 Start Server & Bore Tunnel
        env:
          OPENCODE_SERVER_AUTH: false
        run: |
          git config --global user.email "badal@example.com"
          git config --global user.name "Badal"
          
          cd packages/opencode
          bun src/index.ts web --port 7860 --hostname 0.0.0.0 &
          
          echo "Waiting for server to start..."
          sleep 15
          
          echo "Starting Bore tunnel..."
          bore local 7860 --to bore.pub
